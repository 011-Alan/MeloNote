      // Inject Handles
      function injectStaffHandles() {
        if (!isEditable) return;
        const oldHandles = document.querySelectorAll('.staff-handle');
        oldHandles.forEach(h => h.remove());

        const oldInsertBtns = document.querySelectorAll('.insert-staff-btn');
        oldInsertBtns.forEach(btn => btn.remove());

        let firstMeasure = document.querySelector('.measure[n="1"]');
        if (!firstMeasure) {
          firstMeasure = document.querySelector('.measure');
        }
        if (!firstMeasure) return;

        const staves = firstMeasure.querySelectorAll('.staff');
        staves.forEach((staffEl, sIdx) => {
          let staffNum = staffEl.getAttribute('n');
          if (!staffNum || staffNum === 'null') {
            staffNum = String(sIdx + 1);
            staffEl.setAttribute('n', staffNum);
          }
          
          const handleGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          handleGroup.setAttribute('class', 'staff-handle');
          handleGroup.setAttribute('data-staff-num', staffNum);
          handleGroup.style.cursor = 'pointer';

          let yCenter = 0;
          let minY = 0;
          let maxY = 0;
          let handleX = -580;
          let connectionX = -100;
          try {
            const bbox = staffEl.getBBox();
            yCenter = bbox.y + bbox.height / 2;
            minY = bbox.y;
            maxY = bbox.y + bbox.height;
            handleX = bbox.x - 600;
            connectionX = bbox.x - 80;
          } catch (e) {
            yCenter = 0;
            minY = 0;
            maxY = 0;
            handleX = -580;
            connectionX = -100;
          }

          const preciseRange = getStaffLinesYRange(staffEl);
          if (preciseRange && preciseRange.minY !== Infinity) {
            yCenter = preciseRange.minY + (preciseRange.maxY - preciseRange.minY) / 2;
            minY = preciseRange.minY;
            maxY = preciseRange.maxY;
          }

          // Connecting line from handle to staff (Feature 1)
          const connLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          connLine.setAttribute('x1', String(handleX));
          connLine.setAttribute('y1', yCenter);
          connLine.setAttribute('x2', String(connectionX));
          connLine.setAttribute('y2', yCenter);
          connLine.setAttribute('stroke', '#a1a1aa');
          connLine.setAttribute('stroke-width', '10');
          connLine.setAttribute('stroke-dasharray', '25,25');
          handleGroup.appendChild(connLine);

          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', String(handleX));
          circle.setAttribute('cy', yCenter);
          circle.setAttribute('r', '75');
          handleGroup.appendChild(circle);

          staffEl.appendChild(handleGroup);

          // Plus button below every staff (Feature 5) with grouping rules (Feature 1)
          let shouldShowPlus = true;
          if (globalPartStavesCounts && globalPartStavesCounts.length > 0) {
            let staffIndexToPartIndex = [];
            let staffIndexToLocalIndex = [];
            globalPartStavesCounts.forEach((count, pIdx) => {
              for (let i = 0; i < count; i++) {
                staffIndexToPartIndex.push(pIdx);
                staffIndexToLocalIndex.push(i);
              }
            });

            const pIdx = staffIndexToPartIndex[sIdx];
            const localIdx = staffIndexToLocalIndex[sIdx];
            const partStaffCount = globalPartStavesCounts[pIdx];

            if (partStaffCount === 2) {
              // Treble/Bass pair -> show only below Bass staff (local index 1)
              if (localIdx === 0) {
                shouldShowPlus = false;
              }
            } else if (partStaffCount > 2) {
              // Multi-staff part -> show only below the last staff
              if (localIdx !== partStaffCount - 1) {
                shouldShowPlus = false;
              }
            }
          }

          if (shouldShowPlus) {
            const insertBtnGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            insertBtnGroup.setAttribute('class', 'insert-staff-btn');
            insertBtnGroup.setAttribute('data-staff-num', staffNum);
            insertBtnGroup.style.cursor = 'pointer';

            const btnY = maxY > 0 ? maxY + 550 : yCenter + 720;

            const plusCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            plusCircle.setAttribute('cx', String(handleX));
            plusCircle.setAttribute('cy', String(btnY));
            plusCircle.setAttribute('r', '300');
            insertBtnGroup.appendChild(plusCircle);

            const plusText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            plusText.setAttribute('x', String(handleX));
            plusText.setAttribute('y', String(btnY));
            plusText.setAttribute('font-size', '500');
            plusText.setAttribute('font-family', 'Arial, sans-serif');
            plusText.setAttribute('font-weight', 'bold');
            plusText.setAttribute('fill', 'white');
            plusText.setAttribute('text-anchor', 'middle');
            plusText.setAttribute('dominant-baseline', 'central');
            plusText.style.pointerEvents = 'none';
            plusText.textContent = '+';
            insertBtnGroup.appendChild(plusText);

            if (staffEl.parentNode) {
              staffEl.parentNode.appendChild(insertBtnGroup);
            } else {
              staffEl.appendChild(insertBtnGroup);
            }

            // Direct pointerup event listener for unified mouse/touch handling
            insertBtnGroup.addEventListener('pointerup', (e) => {
              console.log("[INSERT STAFF] BUTTON PRESSED", staffNum);
              e.preventDefault();
              e.stopPropagation();
              console.log("[INSERT STAFF] SENDING MESSAGE", staffNum);
              sendResponse({
                type: 'INSERT_STAFF_BELOW',
                staffIndex: parseInt(staffNum) - 1
              });
            });
          }
        });
      }

              if (xRange.minX !== Infinity && xRange.maxX !== -Infinity &&

              // Insert as first child of staffEl so it resides behind notes/lines

            } catch (e) {

             // Bind click event listener to the parent staffEl element to capture clicks on staff lines and whitespace
             if (!staffEl.hasClickListener) {
               staffEl.hasClickListener = true;
               staffEl.addEventListener('click', (e) => {
                 if (e.target.closest('.staff-handle')) return;
                 if (e.target.closest('.insert-staff-btn')) return;
                 if (e.target.closest('.note')) return; // let note selection handle it
                 if (wasLongPress || hasDraggedRecently) {
                   wasLongPress = false;

                 // Task 2: Log details for tracing click event path

                 console.log("event.currentTarget:", e.currentTarget);
                 console.log("selected measure number:", measureNumber);
                 console.log("selected staff number:", staffNumber);

                 // Task 3: Verify whether the clicked measure and selected measure are different
                 const clickedMeasureNum = parseInt(measureNumber);
                 const prevSelectedMeasureNumVal = selectedBarId ? parseInt(selectedBarId.split('_m')[1]) : null;
                 console.log("Clicked measure and selected measure different:", clickedMeasureNum !== prevSelectedMeasureNumVal);

                 const now = Date.now();
                 const isDoubleTap = (now - lastClickTime < 350) && (lastClickedBarId === barId);
                 lastClickTime = now;
                 lastClickedBarId = barId;

                 selectBar(barId, staffNumber, measureNumber, false, staffEl, isDoubleTap);
                 e.stopPropagation();

             // Bind touchstart double tap event listener for mobile device responsiveness
             let lastTouchTime = 0;

               staffEl.hasTouchListener = true;
               staffEl.addEventListener('touchstart', (e) => {
                 if (e.target.closest('.staff-handle')) return;
                 if (e.target.closest('.insert-staff-btn')) return;

                 const now = Date.now();
                 if (now - lastTouchTime < 350) {
                   lastTouchTime = 0;
                   selectBar(barId, staffNumber, measureNumber, false, staffEl, true);
                   e.preventDefault();
                   e.stopPropagation();
                 } else {
                   lastTouchTime = now;

               }, { passive: false });
             }
           });
         });

        // Re-apply selected bar class if selectedBarId is active

          selectedBarId
        });
        if (selectedBarId) {
          const selectedEl = document.querySelector('.staff[data-bar-id="' + selectedBarId + '"]');
          if (selectedEl) {

              staffLines.forEach(p => {
                try {
                  const b = p.getBBox();
                  if (b.x < minX) minX = b.x;
                  if (b.x + b.width > maxX) maxX = b.x + b.width;
                  if (b.y < minY) minY = b.y;
                  if (b.y + b.height > maxY) maxY = b.y + b.height;
                } catch(e) {}
              });
              
              if (minX !== Infinity) {
                if (contentStartX !== null && contentStartX > minX) {

                  x = minX;

                y = minY;

      // Drag and Drop Logic
      let activeDrag = null;

      function initDragAndDrop() {
        const scoreWrap = document.getElementById('score-wrap');
        if (!scoreWrap) return;

        const startPressTimer = (staffNum) => {
          // Long press disabled
        };

        const cancelPressTimer = () => {
          if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
          }
        };

        let barPressTimer = null;
        let barTimerCoords = null;
        let barTimerEl = null;
        const startBarPressTimer = (selectionId, staffNum, measureNum, coords, clickedEl) => {
          // Long press disabled
        };

        const cancelBarPressTimer = () => {
          if (barPressTimer) {
            clearTimeout(barPressTimer);
            barPressTimer = null;
          }
          barTimerCoords = null;
        };

        const getEventCoords = (e) => {
          if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX, y: e.touches[0].clientY };
          }
          return { x: e.clientX, y: e.clientY };
        };

        const handleStart = (e) => {
          if (!isEditable) return;
          cancelPressTimer();
          cancelBarPressTimer();
          wasLongPress = false;

          const isNoteOrHandle = e.target.closest('.note') || e.target.closest('.staff-handle');
          if (!isNoteOrHandle) {
            // Let browser native scrolling handle it
            return;
          }

          const handleEl = e.target.closest('.staff-handle');
          if (handleEl) {
            const staffNum = handleEl.getAttribute('data-staff-num');
            const coords = getEventCoords(e);
            activeDrag = {
              type: 'staff',
              id: staffNum,
              startX: coords.x,
              startY: coords.y,
              currentX: coords.x,
              currentY: coords.y
            };
            selectStaff(staffNum);
            e.preventDefault();
            return;
          }
        };

        const handleMove = (e) => {
          const coords = getEventCoords(e);

          if (barPressTimer && barTimerCoords) {
            const dx = coords.x - barTimerCoords.x;
            const dy = coords.y - barTimerCoords.y;
            if (Math.hypot(dx, dy) > 15) {
              // User is dragging/scrolling before long-press fires: cancel timer so scroll goes through
              cancelBarPressTimer();
              hasDraggedRecently = true;
            }
          }

          if (pressTimer) {
            // Cancel staff select timer if moved
            cancelPressTimer();
          }

          if (!activeDrag) return;
          const dx = coords.x - activeDrag.startX;
          const dy = coords.y - activeDrag.startY;

          activeDrag.currentX = coords.x;
          activeDrag.currentY = coords.y;

          if (activeDrag.type === 'staff') {
            e.preventDefault();
            showStaffDragLine(activeDrag.currentY);
          } else if (activeDrag.type === 'measure') {
            activeDrag.hasDragged = true;
            e.preventDefault();
            showMeasureDragLine(activeDrag.currentX);
          }
        };

        const handleEnd = (e) => {
          cancelPressTimer();
          cancelBarPressTimer();

          if (wasLongPress) {
            setTimeout(() => {
              wasLongPress = false;
            }, 50);
          }
          if (hasDraggedRecently) {
            setTimeout(() => {
              hasDraggedRecently = false;
            }, 100);
          }
          if (!activeDrag) return;
          hideDragLines();

          if (activeDrag.type === 'staff') {
            const targetIndex = findStaffDropTarget(activeDrag.currentY);
            const fromIndex = parseInt(activeDrag.id) - 1;
            if (targetIndex !== null && targetIndex !== fromIndex) {
              sendResponse({
                type: 'STAFF_REORDER',
                fromIndex: fromIndex,
                toIndex: targetIndex
              });
            }
          } else if (activeDrag.type === 'measure' && activeDrag.hasDragged) {
            const targetIndex = findMeasureDropTarget(activeDrag.currentX);
            const fromIndex = parseInt(activeDrag.id) - 1;
            if (targetIndex !== null && targetIndex !== fromIndex) {
              sendResponse({
                type: 'MEASURE_REORDER',
                fromIndex: fromIndex,
                toIndex: targetIndex
              });
            }
          }
          activeDrag = null;
        };

        // Scroll listener to set hasDraggedRecently during scrolling to block clicks
        let scrollTimeout = null;
        scoreWrap.addEventListener('scroll', () => {
          hasDraggedRecently = true;
          if (scrollTimeout) {
            clearTimeout(scrollTimeout);
          }
          scrollTimeout = setTimeout(() => {
            hasDraggedRecently = false;
          }, 150);
        });

        // Mouse drag-to-scroll implementation (move sheet with cursor)
        let isDraggingMouse = false;
        let startX = 0;
        let startY = 0;
        let startScrollLeft = 0;
        let startScrollTop = 0;

        scoreWrap.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          if (e.target.closest('.staff-handle') || e.target.closest('.insert-staff-btn') || e.target.closest('.note')) return;

          isDraggingMouse = true;
          startX = e.clientX;
          startY = e.clientY;
          startScrollLeft = scoreWrap.scrollLeft;
          startScrollTop = scoreWrap.scrollTop;
          scoreWrap.style.cursor = 'grabbing';
          e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
          if (!isDraggingMouse) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          scoreWrap.scrollLeft = startScrollLeft - dx;
          scoreWrap.scrollTop = startScrollTop - dy;

          if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            hasDraggedRecently = true;
          }
        });

        window.addEventListener('mouseup', () => {
          if (isDraggingMouse) {
            isDraggingMouse = false;
            scoreWrap.style.cursor = 'grab';
            setTimeout(() => {
              hasDraggedRecently = false;
            }, 50);
          }
        });

        scoreWrap.addEventListener('mousedown', handleStart);
        scoreWrap.addEventListener('touchstart', handleStart);

        window.addEventListener('mousemove', handleMove, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });

        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        // Zoom gestures: Mobile pinch-to-zoom
        let initialDist = 0;
        let initialZoom = 1.0;
        scoreWrap.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2) {
            initialDist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            initialZoom = zoomLevel;
          }
        });

        scoreWrap.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2 && initialDist > 0) {
            e.preventDefault();
            const currentDist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            const newZoom = initialZoom * (currentDist / initialDist);
            window.updateZoom(newZoom);
          }
        }, { passive: false });

        scoreWrap.addEventListener('touchend', (e) => {
          if (e.touches.length < 2) {
            initialDist = 0;
          }
        });

        // Zoom gestures: Web Ctrl + Mouse Wheel & Shift + Mouse Wheel for horizontal scroll
        scoreWrap.addEventListener('wheel', (e) => {
          if (e.ctrlKey) {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.1 : 0.9;
            window.updateZoom(zoomLevel * factor);
          } else if (e.shiftKey) {
            e.preventDefault();
            scoreWrap.scrollLeft += e.deltaY;
          } else if (Math.abs(e.deltaX) < 1 && Math.abs(e.deltaY) > 0) {
            e.preventDefault();
            scoreWrap.scrollTop += e.deltaY;
          }
        }, { passive: false });
      }

      function showStaffDragLine(screenY) {
        let line = document.getElementById('staff-drag-line');
        if (!line) {
          line = document.createElement('div');
          line.id = 'staff-drag-line';
          line.style.cssText = 'position: absolute; left: 0; right: 0; height: 4px; background: #8b5cf6; pointer-events: none; z-index: 9999;';
          document.body.appendChild(line);
        }

        const dropTarget = findStaffDropTarget(screenY);
        if (dropTarget !== null) {
          const firstMeasure = document.querySelector('.measure[n="1"]');
          if (firstMeasure) {
            const staves = firstMeasure.querySelectorAll('.staff');
            const staffEl = staves[dropTarget];
            if (staffEl) {
              const bbox = staffEl.getBoundingClientRect();
              const scrollY = window.scrollY || window.pageYOffset;
              line.style.top = (bbox.top + scrollY) + 'px';
              line.style.display = 'block';
            }
          }
        } else {
          line.style.display = 'none';
        }
      }

      function findStaffDropTarget(screenY) {
        const firstMeasure = document.querySelector('.measure[n="1"]');
        if (!firstMeasure) return null;

        const staves = firstMeasure.querySelectorAll('.staff');
        let closestIndex = null;
        let minDiff = Infinity;

        staves.forEach((staffEl, idx) => {
          const bbox = staffEl.getBoundingClientRect();
          const yCenter = bbox.top + bbox.height / 2;
          const diff = Math.abs(screenY - yCenter);
          if (diff < minDiff) {
            minDiff = diff;
            closestIndex = idx;
          }
        });

        return closestIndex;
      }

      function showMeasureDragLine(screenX) {
        let line = document.getElementById('measure-drag-line');
        if (!line) {
          line = document.createElement('div');
          line.id = 'measure-drag-line';
          line.style.cssText = 'position: absolute; top: 0; bottom: 0; width: 4px; background: #8b5cf6; pointer-events: none; z-index: 9999;';
          document.body.appendChild(line);
        }

        const dropTarget = findMeasureDropTarget(screenX);
        if (dropTarget !== null) {
          const measureEl = document.querySelector('.measure[n="' + (dropTarget + 1) + '"]');
          if (measureEl) {
            const bbox = measureEl.getBoundingClientRect();
            const scrollX = window.scrollX || window.pageXOffset;
            line.style.left = (bbox.left + scrollX) + 'px';
            line.style.display = 'block';
          }
        } else {
          line.style.display = 'none';
        }
      }

      function findMeasureDropTarget(screenX) {
        const measures = document.querySelectorAll('.measure');
        let closestIndex = null;
        let minDiff = Infinity;

        measures.forEach((measureEl, idx) => {
          const bbox = measureEl.getBoundingClientRect();
          const xCenter = bbox.left + bbox.width / 2;
          const diff = Math.abs(screenX - xCenter);
          if (diff < minDiff) {
            minDiff = diff;
            closestIndex = idx;
          }
        });

        return closestIndex;
      }

        const staffLine = document.getElementById('staff-drag-line');
        if (staffLine) staffLine.style.display = 'none';
        
        const measureLine = document.getElementById('measure-drag-line');

      function initClickOutsideListener() {
        let docDragStartX = 0;
        let docDragStartY = 0;
        let docHasDragged = false;

        document.addEventListener('mousedown', (e) => {
          docDragStartX = e.clientX;
          docDragStartY = e.clientY;
          docHasDragged = false;
        });
        
        document.addEventListener('touchstart', (e) => {
          if (e.touches && e.touches[0]) {
            docDragStartX = e.touches[0].clientX;
            docDragStartY = e.touches[0].clientY;
          }
          docHasDragged = false;
        }, { passive: true });

        document.addEventListener('mousemove', (e) => {
          const dx = e.clientX - docDragStartX;
          const dy = e.clientY - docDragStartY;
          if (Math.hypot(dx, dy) > 10) {
            docHasDragged = true;
          }
        });
        
        document.addEventListener('touchmove', (e) => {
          if (e.touches && e.touches[0]) {
            const dx = e.touches[0].clientX - docDragStartX;
            const dy = e.touches[0].clientY - docDragStartY;
            if (Math.hypot(dx, dy) > 10) {
              docHasDragged = true;
            }
          }
        }, { passive: true });

        document.addEventListener('click', (e) => {
          if (docHasDragged) {
            return;
          }

          if (isEditModeActive) {
            // The modal backdrop and everything inside it (popup, buttons) are "inside"
            const isClickInside = e.target.closest('#modal-backdrop') || e.target.closest('.selected-bar');
            if (isClickInside) {
              return;
            } else {
              exitEditMode();
              clearSelection();
              return;
            }
          }

          // Exclude buttons, inputs, controls, etc.
          if (e.target.closest('.tempo-control') || 
              e.target.closest('.player-header') || 
              e.target.closest('.player-footer') || 
              e.target.closest('button') || 
              e.target.closest('input')) {
            return;
          }

          // Exclude music items
          if (e.target.closest('.staff') || 
              e.target.closest('.note') || 
              e.target.closest('.staff-handle') ||
              e.target.closest('.insert-staff-btn')) {
            return;
          }

          if (wasLongPress || hasDraggedRecently) {
            return;
          }

          console.log("Deselect clicked elsewhere:", e.target);
          resetDoubleTapTimer();
          clearSelection();
        });
      }

      // Initialize Drag & Drop listeners on load
      window.addEventListener('load', () => {
        initDragAndDrop();
        initClickOutsideListener();
      });

      const cdns = [
        "https://cdn.jsdelivr.net/npm/verovio@4.1.0/dist/verovio-toolkit-wasm.js",
        "https://unpkg.com/verovio@4.1.0/dist/verovio-toolkit-wasm.js",
        "https://www.verovio.org/javascript/4.1.0/verovio-toolkit-wasm.js"
      ];
      let currentCdnIndex = 0;

      function loadScript(url, onSuccess, onError) {
        const script = document.createElement('script');
        script.src = url;
        script.onload = onSuccess;
        script.onerror = onError;
        document.head.appendChild(script);
      }

      const jspdfCdns = [
        "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",
        "https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js",
        "https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"
      ];

      function ensureJsPdfLoaded() {
        return new Promise((resolve, reject) => {
          if (typeof window.jspdf !== 'undefined') {
            resolve(window.jspdf);
            return;
          }
          let cdnIndex = 0;
          function tryNextJsPdfCdn() {
            if (cdnIndex >= jspdfCdns.length) {
              reject(new Error("Failed to load jsPDF library from all CDNs."));
              return;
            }
            const url = jspdfCdns[cdnIndex++];
            console.log("Attempting to load jsPDF from:", url);
            loadScript(url,
              () => {
                if (typeof window.jspdf !== 'undefined') {
                  console.log("jsPDF loaded successfully from:", url);
                  resolve(window.jspdf);
                } else {
                  console.warn("jsPDF loaded from " + url + " but window.jspdf is undefined.");
                  tryNextJsPdfCdn();
                }
              },
              (err) => {
                console.warn("Failed to load jsPDF from:", url, err);
                tryNextJsPdfCdn();
              }
            );
          }
          tryNextJsPdfCdn();
        });
      }

      function tryNextCdn() {
        if (currentCdnIndex >= cdns.length) {
          console.error("All CDNs failed to load Verovio script.");
          showError("Verovio script failed to load from all CDNs. Please check your internet connection.");
          return;
        }
        const url = cdns[currentCdnIndex++];
        console.log("Attempting to load Verovio from:", url);
        loadScript(url, 
          () => {
            console.log("Verovio script loaded from:", url);
            let retries = 0;
            const interval = setInterval(() => {
              if (typeof verovio !== 'undefined' && verovio.module) {
                clearInterval(interval);
                if (verovio.toolkit && verovio.toolkit.prototype) {
                  const originalSetOptions = verovio.toolkit.prototype.setOptions;
                  verovio.toolkit.prototype.setOptions = function(options) {
                    const customOptions = {
                      ...options,
                      mnumInterval: 0
                    };
                    return originalSetOptions.call(this, customOptions);
                  };
                }
                verovio.module.onRuntimeInitialized = () => {
                  verovioLoaded = true;
                  renderScore();
                };
                if (verovio.module.calledRun) {
                  verovioLoaded = true;
                  renderScore();
                }
              } else {
                retries++;
                if (retries > 360) { // Increased from 120 to 360 (18 seconds) for slower mobile CPUs
                  clearInterval(interval);
                  console.warn("WASM compilation timed out for:", url);
                  tryNextCdn();
                }
              }
            }, 50);
          }, 
          () => {
            console.warn("Failed to load Verovio script from:", url);
            tryNextCdn();
          }
        );
      }

      function initAndRender() {
        tryNextCdn();
      }

      function sendResponse(payload) {
        const jsonStr = JSON.stringify(payload);
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(jsonStr);
        } else {
          window.parent.postMessage(jsonStr, '*');
        }
      }

      window.generatePDF = async function() {
        try {
          const jspdfModule = await ensureJsPdfLoaded();
          const { jsPDF } = jspdfModule;
          
          // Save current options
          const oldOpts = vrvToolkit.getOptions();
          
          // Set pagination options for A4 (ratio 1:1.414)
          const pdfPageWidth = 1200;
          const pdfPageHeight = 1697; // 1200 * 1.414
          
          vrvToolkit.setOptions({
            pageWidth: pdfPageWidth,
            pageHeight: pdfPageHeight,
            scale: 30,
            adjustPageHeight: false,
            breaks: 'auto'
          });
          
          // Reload data to apply pagination options
          const musicxml = atob(musicxmlBase64);
          vrvToolkit.loadData(musicxml);
          
          const pageCount = vrvToolkit.getPageCount();
          const pdf = new jsPDF('p', 'px', [pdfPageWidth, pdfPageHeight]);
          
          for (let pageNum = 1; pageNum <= pageCount; pageNum++) {
            if (pageNum > 1) {
              pdf.addPage([pdfPageWidth, pdfPageHeight], 'p');
            }
            
            const rawSvgString = vrvToolkit.renderToSVG(pageNum, {});
            const scoreRoot = document.getElementById('score');
            const originalInnerHTML = scoreRoot ? scoreRoot.innerHTML : '';
            if (scoreRoot) {
              scoreRoot.innerHTML = rawSvgString;
              ensureSelectionMetadata(scoreRoot);
            }
            const svgString = scoreRoot ? scoreRoot.innerHTML : rawSvgString;
            if (scoreRoot) {
              scoreRoot.innerHTML = originalInnerHTML;
            }
            
            // Convert SVG string to canvas
            const canvas = await new Promise((resolve, reject) => {
              const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
              const blobURL = (window.URL || window.webkitURL || window).createObjectURL(svgBlob);
              const image = new Image();
              image.onload = () => {
                const c = document.createElement('canvas');
                c.width = pdfPageWidth;
                c.height = pdfPageHeight;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, pdfPageWidth, pdfPageHeight);
                ctx.drawImage(image, 0, 0);
                (window.URL || window.webkitURL || window).revokeObjectURL(blobURL);
                resolve(c);
              };
              image.onerror = (err) => {
                (window.URL || window.webkitURL || window).revokeObjectURL(blobURL);
                reject(new Error('Failed to load SVG image for canvas rendering.'));
              };
              image.src = blobURL;
            });
            
            const imgData = canvas.toDataURL('image/png');
            pdf.addImage(imgData, 'PNG', 0, 0, pdfPageWidth, pdfPageHeight);
          }
          
          // Restore original options and re-render for screen display
          vrvToolkit.setOptions(oldOpts);
          vrvToolkit.loadData(musicxml);
          const svg = vrvToolkit.renderToSVG(1, {});
          

          document.getElementById('score').innerHTML = svg;
          ensureSelectionMetadata(document.getElementById('score'));
          const scoreSvg = document.getElementById('score').querySelector('svg');
          if (scoreSvg) {
            scoreSvg.style.width = '100%';
            scoreSvg.style.height = 'auto';
          }
          
          const pdfBase64 = pdf.output('datauristring');
          sendResponse({
            type: 'PDF_GENERATED',
            data: pdfBase64
          });
          
        } catch (err) {
          sendResponse({
            type: 'PDF_ERROR',
            error: err.message
          });
        }
      };

      function handleIncomingMessage(event) {
        console.log(
          "[WEBVIEW RECEIVED MESSAGE]",
          event.data?.length
        );
        try {
          const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
          if (!data) return;
          console.log("WEBVIEW RECEIVED MESSAGE:", data);
          
          if (data.type === 'SET_EDIT_MODE') {
            isEditable = !!data.editable;
            if (isEditable) {
              document.body.classList.remove('view-mode');
              injectStaffHandles();
            } else {
              document.body.classList.add('view-mode');
              clearDOMSelection();
              document.querySelectorAll('.staff-handle, .insert-staff-btn').forEach(el => el.remove());
            }
          } else if (data.type === 'UPDATE_XML') {
            if (data.musicxml) {
              console.log("WEBVIEW RECEIVED UPDATE_XML, re-rendering score");
              
              let oldXml = '';
              try {
                oldXml = musicxmlBase64 ? atob(musicxmlBase64) : '';
              } catch(e) {
                console.log("[WEBVIEW UPDATE_XML OLD DECODE ERROR]", e.message);
              }
              console.log("[WEBVIEW UPDATE_XML STORED XML BEFORE UPDATE]", oldXml.length);
              
              try {
                musicxmlBase64 = btoa(data.musicxml);
                console.log("[WEBVIEW UPDATE_XML STORED XML AFTER UPDATE]", data.musicxml.length);
              } catch(e) {
                console.log("[WEBVIEW UPDATE_XML BTOA ERROR]", e.message);
              }
              
              const xml = data.musicxml;
              console.log(
                "[WEBVIEW XML UPDATED]",
                xml.length
              );
              renderScore();
              rebuildPlaybackSchedule();
            }
          } else if (data.type === 'UPDATE_TEMPO') {
            if (data.tempo !== undefined) {
              console.log("WEBVIEW RECEIVED UPDATE_TEMPO:", data.tempo);
              originalTempo = data.tempo;
              tempo = data.tempo;
              const roundedOriginal = Math.round(originalTempo);
              const detectedText = document.getElementById('detected-tempo-text');
              if (detectedText) detectedText.textContent = 'Detected: ' + roundedOriginal + ' BPM';
              const slider = document.getElementById('tempo-range');
              if (slider) slider.value = roundedOriginal;
              const valLabel = document.getElementById('tempo-val');
              if (valLabel) valLabel.textContent = roundedOriginal;
            }
          } else if (data.type === 'UPDATE_TIME_SIGNATURE') {
            if (data.timeSignature) {
              console.log("WEBVIEW RECEIVED UPDATE_TIME_SIGNATURE:", data.timeSignature);
              timeSignature = data.timeSignature;
            }
          } else if (data.type === 'GENERATE_PDF') {
            window.generatePDF();
          } else if (data.type === 'PLAY') {
            startPlayback();
          } else if (data.type === 'PAUSE') {
            pausePlayback();
          } else if (data.type === 'RESTART') {
            window.restartPlayback();
          } else if (data.type === 'SEEK') {
            window.seekToTime(data.time);
          } else if (data.type === 'SET_TEMPO') {
            if (data.tempo !== undefined) {
              window.setTempo(data.tempo, false);
              const slider = document.getElementById('tempo-range');
              if (slider) slider.value = Math.round(data.tempo);
            }
          } else if (data.type === 'SET_SPEED') {
            if (data.rate !== undefined) {
              window.setTempo(originalTempo * data.rate, false);
              const slider = document.getElementById('tempo-range');
              if (slider) slider.value = Math.round(originalTempo * data.rate);
            }
          } else if (data.type === 'HIGHLIGHT_NOTE') {
            if (data.time !== undefined) {
              const speed = tempo / originalTempo;
              window.highlightCurrentNote(data.time * speed);
            }
          } else if (data.type === 'ZOOM_IN') {
            window.updateZoom(zoomLevel + 0.1);
          } else if (data.type === 'ZOOM_OUT') {
            window.updateZoom(zoomLevel - 0.1);
          } else if (data.type === 'RESET_ZOOM') {
            window.updateZoom(1.0);
          } else if (data.type === 'SELECT_BAR') {
            if (data.selectionId !== undefined) {
              selectBar(data.selectionId, data.staffNumber, data.measureNumber, !!data.isLongPress);
            }
          } else if (data.type === 'SELECT_NOTE') {
            if (data.noteId !== undefined) {
              selectNote(data.noteId);
            }
          } else if (data.type === 'SELECT_NOTES') {
            if (data.noteIds !== undefined && Array.isArray(data.noteIds)) {
              document.querySelectorAll('.selected-note').forEach(el => el.classList.remove('selected-note'));
              selectedNoteIds = [...data.noteIds];
              selectedNoteIds.forEach(id => {
                const noteEl = document.getElementById(id);
                if (noteEl) noteEl.classList.add('selected-note');
              });
            }
          } else if (data.type === 'SELECT_MEASURE') {
            if (data.measureIndex !== undefined) {
              selectMeasure(data.measureIndex + 1, !!data.isLongPress);
            }
          } else if (data.type === 'SELECT_STAFF') {
            if (data.staffIndex !== undefined) {
              selectStaff(data.staffIndex + 1);
            }
          } else if (data.type === 'CLEAR_SELECTION') {
            clearSelection();
          } else if (data.type === 'EXIT_EDIT_MODE') {
            exitEditMode();
          } else if (data.type === 'UPDATE_VIEWPORT') {
            const backdrop = document.getElementById('modal-backdrop');
            if (backdrop) {
              backdrop.style.position = 'absolute';
              backdrop.style.top = data.scrollY + 'px';
              backdrop.style.height = data.viewportHeight + 'px';
            }
          }
        } catch (e) {
          // Ignore parse errors from unrelated messages
        }
      }

      window.addEventListener('message', handleIncomingMessage);
      document.addEventListener('message', handleIncomingMessage);
      window.addEventListener('resize', () => {
        renderScore();
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          exitEditMode();
          return;
        }
        if (!selectedNoteId) return;
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          sendResponse({
            type: 'MOVE_NOTE',
            noteId: selectedNoteId,
            direction: 'up'
          });
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          sendResponse({
            type: 'MOVE_NOTE',
            noteId: selectedNoteId,
            direction: 'down'
          });
        }
      });

      if (document.readyState === 'complete') {
        initAndRender();
      } else {
        window.addEventListener('load', initAndRender);
      }
    </script>
  
</body></html>
