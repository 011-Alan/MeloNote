      function getBeatsPerMeasure(timeSig) {

          }

          const stepToSemitone = {
            'C': 0, 'D': 2, 'E': 4, 'F': 5, 'G': 7, 'A': 9, 'B': 11
          };

          let semitone = stepToSemitone[step];
          if (acc === '#') {
            semitone += 1;
          } else if (acc === 'b') {
            semitone -= 1;
          }

          return (octave + 1) * 12 + semitone;
        }

        function getKeySignatureAlterations(fifths) {
          const sharps = ['F', 'C', 'G', 'D', 'A', 'E', 'B'];
          const flats = ['B', 'E', 'A', 'D', 'G', 'C', 'F'];
          const alters = {};
          if (fifths > 0) {
            for (let i = 0; i < Math.min(fifths, 7); i++) {
              alters[sharps[i]] = 1;
            }
          } else if (fifths < 0) {
            for (let i = 0; i < Math.min(Math.abs(fifths), 7); i++) {
              alters[flats[i]] = -1;
            }
          }
          return alters;
        }

        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlString, "text/xml");
        const events = [];
        
        const parts = xmlDoc.getElementsByTagName("part");
        for (let p = 0; p < parts.length; p++) {
          const part = parts[p];
          const measures = part.getElementsByTagName("measure");
          let measureStartBeat = 0.0;
          let divisions = 4;
          let beatsPerMeasure = 4.0;
          let activeAlterations = {};
          
          for (let m = 0; m < measures.length; m++) {
            const measure = measures[m];
            let currentBeat = 0.0;
            let lastNoteStartBeat = 0.0;
            let measureOverrides = {};
            
            // Check divisions
            const divElements = measure.getElementsByTagName("divisions");
            if (divElements.length > 0) {
              divisions = parseInt(divElements[0].textContent) || 4;
            }
            
            // Check time signature
            const timeElements = measure.getElementsByTagName("time");
            if (timeElements.length > 0) {
              const beats = parseInt(timeElements[0].getElementsByTagName("beats")[0].textContent) || 4;
              const beatType = parseInt(timeElements[0].getElementsByTagName("beat-type")[0].textContent) || 4;
              beatsPerMeasure = (beats / beatType) * 4.0;
            }

            // Check key signature
            const keyElements = measure.getElementsByTagName("key");
            if (keyElements.length > 0) {
              const fifthsElement = keyElements[0].getElementsByTagName("fifths")[0];
              if (fifthsElement) {
                const fifths = parseInt(fifthsElement.textContent) || 0;
                activeAlterations = getKeySignatureAlterations(fifths);
              }
            }
            
            const children = measure.children;
            for (let c = 0; c < children.length; c++) {
              const child = children[c];
              const tagName = child.tagName.toLowerCase();
              
              if (tagName === "note") {
                const durationElement = child.getElementsByTagName("duration")[0];
                const durVal = durationElement ? parseInt(durationElement.textContent) : 0;
                const durBeats = durVal / divisions;
                
                const isChord = child.getElementsByTagName("chord").length > 0;
                const isRest = child.getElementsByTagName("rest").length > 0;
                const staffElement = child.getElementsByTagName("staff")[0];
                const staffNum = staffElement ? parseInt(staffElement.textContent) : 1;
                // Track voice for per-voice timing isolation
                const voiceElement = child.getElementsByTagName("voice")[0];
                const voiceNum = voiceElement ? parseInt(voiceElement.textContent) : 1;
                
                const idAttr = child.getAttribute("id");
                const absIdx = idAttr ? parseInt(idAttr.replace("n", "")) : -1;

                let skippedReason = null;
                if (isNaN(durBeats) || durBeats <= 0) {
                  skippedReason = "invalid duration";
                }
                if (!isRest) {
                  const pitchElement = child.getElementsByTagName("pitch")[0];
                  if (!pitchElement) {
                    skippedReason = "missing pitch";
                  } else {
                    const stepEl = pitchElement.getElementsByTagName("step")[0];
                    const octEl = pitchElement.getElementsByTagName("octave")[0];
                    if (!stepEl || !octEl) {
                      skippedReason = "missing pitch (step or octave)";
                    }
                  }
                }
                const auditStartBeat = measureStartBeat + (isChord ? lastNoteStartBeat - measureStartBeat : currentBeat);
                if (auditStartBeat < 0) {
                  skippedReason = "negative timing";
                }
                if (currentBeat + durBeats > beatsPerMeasure + 0.01 && !isChord) {
                  console.log("[PLAYBACK AUDIT] Warning: Note measure overflow. Measure beats capacity: " + beatsPerMeasure + ", Current position: " + currentBeat + ", Note duration: " + durBeats);
                }
                if (skippedReason) {
                  console.log("[PLAYBACK AUDIT] Note skipped. Reason: " + skippedReason + ", XML: " + (child.outerHTML ? child.outerHTML.substring(0, 150) : ""));
                }
                
                let pitchStr = "rest";
                if (!isRest) {
                  const pitchElement = child.getElementsByTagName("pitch")[0];
                  if (pitchElement) {
                    const step = pitchElement.getElementsByTagName("step")[0].textContent;
                    const octave = pitchElement.getElementsByTagName("octave")[0].textContent;
                    
                    // Look for explicit accidental tag inside note
                    const accidentalElement = child.getElementsByTagName("accidental")[0];
                    const explicitAcc = accidentalElement ? accidentalElement.textContent : null;
                    
                    let resolvedAcc = "";
                    if (explicitAcc === "sharp") {
                      resolvedAcc = "#";
                      measureOverrides[step + octave] = "#";
                    } else if (explicitAcc === "flat") {
                      resolvedAcc = "b";
                      measureOverrides[step + octave] = "b";
                    } else if (explicitAcc === "natural") {
                      resolvedAcc = "n";
                      measureOverrides[step + octave] = "n";
                    } else {
                      // Check measure overrides
                      if (measureOverrides[step + octave] !== undefined) {
                        resolvedAcc = measureOverrides[step + octave];
                      } else {
                        // Check key signature
                        const keyAlter = activeAlterations[step];
                        if (keyAlter === 1) {
                          resolvedAcc = "#";
                        } else if (keyAlter === -1) {
                          resolvedAcc = "b";
                        } else {
                          resolvedAcc = "";
                        }
                      }
                    }
                    
                    const pitchAcc = resolvedAcc === "n" ? "" : resolvedAcc;
                    pitchStr = step + pitchAcc + octave;
                  }
                }
                
                // Check if this note is a tie stop (continuation of a tied note)
                let isTieStop = false;
                const tieElements = child.getElementsByTagName("tie");
                for (let t = 0; t < tieElements.length; t++) {
                  if (tieElements[t].getAttribute("type") === "stop") {
                    isTieStop = true;
                    break;
                  }
                }
                
                let startBeat;
                if (isChord) {
                  startBeat = lastNoteStartBeat;
                } else {
                  startBeat = measureStartBeat + currentBeat;
                  lastNoteStartBeat = startBeat;
                  currentBeat += durBeats;
                }
                
                if (!isRest && pitchStr !== "rest") {
                  if (isTieStop) {
                    let merged = false;
                    for (let idx = events.length - 1; idx >= 0; idx--) {
                      const prevEvent = events[idx];
                      const prevMidi = prevEvent.pitch === "rest" ? -1 : pitchStringToMidi(prevEvent.pitch);
                      const currMidi = pitchStr === "rest" ? -2 : pitchStringToMidi(pitchStr);
                      if (prevMidi === currMidi && 
                          prevEvent.staff === staffNum && 
                          prevEvent.partIndex === p &&
                          prevEvent.voice === voiceNum && 
                          Math.abs(prevEvent.startBeat + prevEvent.durationBeats - startBeat) < 0.01) {
                        prevEvent.durationBeats = Math.round((prevEvent.durationBeats + durBeats) * 1000) / 1000;
                        merged = true;
                        break;
                      }
                    }
                    if (!merged) {
                      events.push({
                        startBeat: Math.round(startBeat * 1000) / 1000,
                        durationBeats: Math.round(durBeats * 1000) / 1000,
                        pitch: pitchStr,
                        absoluteIndex: absIdx,
                        staff: staffNum,
                        partIndex: p,
                        voice: voiceNum,
                        measure: m + 1
                      });
                    }
                  } else {
                    events.push({
                      startBeat: Math.round(startBeat * 1000) / 1000,
                      durationBeats: Math.round(durBeats * 1000) / 1000,
                      pitch: pitchStr,
                      absoluteIndex: absIdx,
                      staff: staffNum,
                      partIndex: p,
                      voice: voiceNum,
                      measure: m + 1
                    });
                  }
                } else {
                  // It is a rest note! Push to events
                  events.push({
                    startBeat: Math.round(startBeat * 1000) / 1000,
                    durationBeats: Math.round(durBeats * 1000) / 1000,
                    pitch: "rest",
                    absoluteIndex: absIdx,
                    staff: staffNum,
                    partIndex: p,
                    voice: voiceNum,
                    measure: m + 1
                  });
                }
              } else if (tagName === "backup") {
                const durationElement = child.getElementsByTagName("duration")[0];
                const durVal = durationElement ? parseInt(durationElement.textContent) : 0;
                currentBeat = Math.max(0.0, currentBeat - durVal / divisions);
              } else if (tagName === "forward") {
                const durationElement = child.getElementsByTagName("duration")[0];
                const durVal = durationElement ? parseInt(durationElement.textContent) : 0;
                currentBeat += durVal / divisions;
              }
            }
            if (currentBeat === 0.0) {
              events.push({
                startBeat: Math.round(measureStartBeat * 1000) / 1000,
                durationBeats: Math.round(beatsPerMeasure * 1000) / 1000,
                pitch: "rest",
                absoluteIndex: -1,
                staff: 1,
                partIndex: p,
                voice: 1,
                measure: m + 1
              });
              currentBeat = beatsPerMeasure;
            }
            measureStartBeat += beatsPerMeasure;
          }
        }
        return events;
      }
      
      function buildPlaybackSchedule(events) {
        if (events.length === 0) return [];
        
        // Sort events by startBeat so we can look ahead reliably
        const sorted = [...events].sort((a, b) => a.startBeat - b.startBeat || a.staff - b.staff);
        
        // Compute effectiveDuration for each note:
        // Cap at the time until the next note in the same staff starts.
        // This prevents one note's oscillator from bleeding into the next
        // note's time slot in the same staff, which causes audible overlap
        // even though the scheduler timer has already moved on.
        sorted.forEach((ev, i) => {
          let nextSameStaffBeat = Infinity;
          for (let j = i + 1; j < sorted.length; j++) {
            if (sorted[j].staff === ev.staff && sorted[j].startBeat > ev.startBeat + 0.001) {
              nextSameStaffBeat = sorted[j].startBeat;
              break;
            }
          }
          const gap = nextSameStaffBeat === Infinity ? ev.durationBeats : (nextSameStaffBeat - ev.startBeat);
          // effectiveDuration: the actual beat count this note should sound for.
          // Capped at the gap to next same-staff note so oscillators don't bleed.
          ev.effectiveDuration = Math.min(ev.durationBeats, gap);
        });
        
        const uniqueStartBeats = Array.from(new Set(sorted.map(e => e.startBeat))).sort((a, b) => a - b);
        const schedule = [];
        let T = 0.0;
        
        for (let i = 0; i < uniqueStartBeats.length; i++) {
          const targetBeat = uniqueStartBeats[i];
          
          if (targetBeat > T + 0.01) {
            const gap = targetBeat - T;
            schedule.push({
              pitch: "rest",
              beats: gap,
              constituentNotes: []
            });
            T = targetBeat;
          }
          
          const notesStarting = sorted.filter(e => Math.abs(e.startBeat - targetBeat) < 0.005);
          
          let tickDuration;
          if (i < uniqueStartBeats.length - 1) {
            tickDuration = uniqueStartBeats[i + 1] - targetBeat;
          } else {
            // For the last tick, use the longest individual note duration
            tickDuration = Math.max(...notesStarting.map(n => n.effectiveDuration));
          }
          
          schedule.push({
            pitch: notesStarting.map(n => n.pitch).join(','),
            beats: tickDuration,
            // pitch_beats uses effectiveDuration so each note's oscillator
            // is limited to its own time slot and never bleeds into the next
            pitch_beats: notesStarting.map(n => n.effectiveDuration),
            constituentNotes: notesStarting.map(n => ({
              pitch: n.pitch,
              absoluteIndex: n.absoluteIndex,
              duration: n.effectiveDuration
            }))
          });
          
          T += tickDuration;
        }
        return schedule;
      }

      function printPlaybackDebugTable(events, activeTempo, beatsPerMeas) {
        console.log("=== PLAYBACK SCHEDULE DEBUG OUTPUT ===");
        console.log("Pitch    | Measure | Voice | Staff | StartBeat | EndBeat");
        console.log("-".repeat(60));
        
        const table = [];
        events.forEach(e => {
          const endBeat = e.startBeat + e.durationBeats;
          
          console.log(
            e.pitch.padEnd(8) + " | " + 
            String(e.measure).padEnd(7) + " | " + 
            String(e.voice).padEnd(5) + " | " + 
            String(e.staff).padEnd(5) + " | " + 
            e.startBeat.toFixed(3).padEnd(9) + " | " + 
            endBeat.toFixed(3)
          );
          
          table.push({
            pitch: e.pitch,
            measure: e.measure,
            voice: e.voice,
            staff: e.staff,
            startBeat: e.startBeat.toFixed(3),
            endBeat: endBeat.toFixed(3)
          });
        });
        
        const debugDiv = document.getElementById("debug-info");
        if (debugDiv) {
          debugDiv.style.display = "none";
        }
      }

      function rebuildPlaybackSchedule() {
        playbackNotes = [];
        noteEvents = [];
        if (musicxmlBase64) {
          try {
            const decodedXml = atob(musicxmlBase64);
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(decodedXml, "text/xml");
            
            // 1. Total rendered notes in score
            const totalNotes = xmlDoc.getElementsByTagName("note").length;
            console.log("[PLAYBACK AUDIT] Total rendered notes:", totalNotes);

            const clefs = xmlDoc.getElementsByTagName("clef");
            let hasBassStaff = false;
            for (let i = 0; i < clefs.length; i++) {
              const sign = clefs[i].getElementsByTagName("sign")[0]?.textContent;
              if (sign === "F") {
                hasBassStaff = true;
                break;
              }
            }

            // Extract the number of staves in each part to map local staff to absolute staff index
            const parts = xmlDoc.getElementsByTagName("part");
            const partStavesCounts = [];
            for (let p = 0; p < parts.length; p++) {
              const measure1 = parts[p].getElementsByTagName("measure")[0];
              const stavesElem = measure1 ? measure1.getElementsByTagName("staves")[0] : null;
              const count = stavesElem ? parseInt(stavesElem.textContent) : 1;
              partStavesCounts.push(count);
            }

            const events = parseMusicXMLPlayback(decodedXml);
            // 2. Total notes passed to playback engine (events count)
            console.log("[PLAYBACK AUDIT] Total notes passed to playback engine:", events.length);
            // 3. Generated playback events
            console.log("[PLAYBACK AUDIT] Generated playback events:", JSON.stringify(events.slice(0, 15)));
            
            let maxMeasure = 0;
            events.forEach(ev => {
              if (ev.measure > maxMeasure) {
                maxMeasure = ev.measure;
              }
            });
            const beatsPerMeasure = getBeatsPerMeasure(timeSignature);
            const totalBeats = maxMeasure * beatsPerMeasure;

            const adjustedEvents = events.map(ev => {
              const partIdx = ev.partIndex || 0;
              const localStaff = ev.staff || 1;
              
              // Calculate absolute staff index S (1-indexed)
              let absStaff = 0;
              for (let p = 0; p < partIdx; p++) {
                absStaff += partStavesCounts[p] || 1;
              }
              absStaff += localStaff;

              // Compute playback offset: parts play sequentially (Pairs play sequentially, staves inside a Part play simultaneously)
              const offset = partIdx * totalBeats;
              
              return {
                ...ev,
                staff: absStaff,
                measure: partIdx * maxMeasure + ev.measure,
                startBeat: ev.startBeat + offset
              };
            });

            noteEvents = adjustedEvents;
            printPlaybackDebugTable(adjustedEvents, originalTempo, beatsPerMeasure);
            playbackNotes = buildPlaybackSchedule(adjustedEvents);
            
            // 4. Scheduled note count
            console.log("[PLAYBACK AUDIT] Scheduled note count:", playbackNotes.length);
            
            // 5. First 10 scheduled notes
            let cumulativeTime = 0.0;
            const first10 = playbackNotes.slice(0, 10).map((note, index) => {
              const durSec = getDurationInSec(note);
              const startTime = cumulativeTime;
              cumulativeTime += durSec;
              return {
                index,
                pitch: note.pitch,
                startTime: startTime.toFixed(3) + "s",
                duration: durSec.toFixed(3) + "s"
              };
            });
            console.log("[PLAYBACK AUDIT] First 10 scheduled notes:", JSON.stringify(first10, null, 2));

            // 7. Verify playback timeline length
            const totalDurationSec = getTotalDuration();
            console.log("[PLAYBACK AUDIT] Playback timeline length:", totalDurationSec.toFixed(3) + "s");
            
            console.log("REBUILT PLAYBACK SCHEDULE:", playbackNotes.length, "notes. hasBassStaff:", hasBassStaff, "totalBeats:", totalBeats);
          } catch (e) {
            console.error("Error parsing MusicXML for playback:", e);
          }
        }

        if (playbackNotes.length === 0) {
          // Fallback to legacy formatting if XML parsing fails
          let arr = [];
          if (Array.isArray(sourceNotes)) {
            arr = sourceNotes;
          } else if (sourceNotes && Array.isArray(sourceNotes.notes)) {
            arr = sourceNotes.notes;
          }
          playbackNotes = arr.map(n => ({
            pitch: n.pitch,
            beats: typeof getNoteBeats === 'function' ? getNoteBeats(n) : 1.0,
            constituentNotes: n.pitch !== 'rest' ? n.pitch.split(',').map(p => ({
              pitch: p,
              absoluteIndex: n.absoluteIndex,
              duration: typeof getNoteBeats === 'function' ? getNoteBeats(n) : 1.0
            })) : []
          }));
        }
      }

      // Playback state variables
      let tempo = Math.round(originalTempo);

      // Initialize playback schedule
      let playbackNotes = [];
      let noteEvents = [];
      rebuildPlaybackSchedule();

      // Playback state variables
      let currentNoteIndex = 0;
      let isPlaying = false;
      let noteStartTimestamp = 0;
      let elapsedInCurrentNote = 0.0;
      let timerId = null;
      let audioCtx = null;
      let activeOscillators = [];
      let activeHighlightTimeouts = [];
      let schedulerStartTime = 0;
      let expectedElapsedTime = 0.0;

      function clearAllHighlights() {
        const prev = document.querySelectorAll('.active-note');
        prev.forEach(el => el.classList.remove('active-note'));
        activeHighlightTimeouts.forEach(tId => clearTimeout(tId));
        activeHighlightTimeouts = [];
      }

      window.highlightCurrentNote = function(nominalTime) {
        // 1. Clear previous highlights
        const prev = document.querySelectorAll('.active-note');
        prev.forEach(el => el.classList.remove('active-note'));
        
        if (noteEvents.length === 0) return;
        
        // 2. Find active note events at nominalTime
        const activeEvents = noteEvents.filter(ev => {
          const startTimeSec = ev.startBeat * (60.0 / originalTempo);
          const endTimeSec = (ev.startBeat + ev.durationBeats) * (60.0 / originalTempo);
          // Epsilon of 10ms for boundary
          return nominalTime >= startTimeSec - 0.01 && nominalTime < endTimeSec - 0.01;
        });
        
        // 3. Highlight them
        activeEvents.forEach(ev => {
          if (ev.pitch === 'rest') return;
          const absIdx = ev.absoluteIndex;
          if (absIdx >= 0) {
            const query = '[id="n' + absIdx + '"]';
            const elements = document.querySelectorAll(query);
            elements.forEach(el => {
              el.classList.add('active-note');
              if (typeof el.scrollIntoView === 'function') {
                el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
              }
            });
          }
        });
      };

      function midiToFreq(midi) {
        return 440 * Math.pow(2, (midi - 69) / 12);
      }

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      function stopAllOscillators() {
        activeOscillators.forEach(osc => {
          try {
            osc.stop();
          } catch (e) {}
        });
        activeOscillators = [];
      }

      function playSingleNoteSound(freq, durationSec) {
        console.log("[PLAYBACK AUDIT] Synthesizer received note event. Frequency: " + freq + ", Duration: " + durationSec + "s");
        initAudio();
        if (audioCtx) {
          console.log("[PLAYBACK AUDIT] AudioContext State: " + audioCtx.state);
        } else {
          console.log("[PLAYBACK AUDIT] AudioContext is null");
        }
        if (!audioCtx) return;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.type = 'triangle'; // Piano-like warm tone
        
        const now = audioCtx.currentTime;
        const scheduleTime = now + 0.02; // 20ms look-ahead buffer
        
        osc.frequency.setValueAtTime(freq, scheduleTime);

        gainNode.gain.setValueAtTime(0, scheduleTime);
        
        // Dynamic ADSR Envelope to prevent out-of-order scheduling errors for short notes
        const attack = Math.min(0.05, durationSec * 0.1);
        const decay = Math.min(0.1, durationSec * 0.2);
        const release = Math.min(0.05, durationSec * 0.1);
        const sustainStart = attack + decay;
        const sustainEnd = Math.max(sustainStart, durationSec - release);

        gainNode.gain.linearRampToValueAtTime(0.2, scheduleTime + attack); // Attack
        gainNode.gain.exponentialRampToValueAtTime(0.1, scheduleTime + sustainStart); // Decay
        gainNode.gain.setValueAtTime(0.1, scheduleTime + sustainEnd); // Sustain
        gainNode.gain.exponentialRampToValueAtTime(0.0001, scheduleTime + durationSec); // Release

        osc.start(scheduleTime);
        osc.stop(scheduleTime + durationSec);

        activeOscillators.push(osc);

        setTimeout(() => {
          const idx = activeOscillators.indexOf(osc);
          if (idx > -1) {
            activeOscillators.splice(idx, 1);
          }
        }, durationSec * 1000 + 100);
      }

      function playNextTick() {
        if (!isPlaying) return;

        if (currentNoteIndex >= playbackNotes.length) {
          isPlaying = false;
          currentNoteIndex = 0;
          elapsedInCurrentNote = 0.0;
          stopAllOscillators();
          clearAllHighlights();
          updatePlayButtonUI();
          updateProgressUI(0);
          return;
        }

        const note = playbackNotes[currentNoteIndex];
        const fullDurationSec = getDurationInSec(note);
        const durationSec = fullDurationSec - elapsedInCurrentNote;

        if (note && note.pitch !== 'rest' && durationSec > 0) {
          console.log("[PLAYBACK AUDIT] playNextTick playing notes: " + note.pitch + ", durSec: " + durationSec);
          const pitches = note.pitch.split(',');
          const pitchBeats = note.pitch_beats || [];
          pitches.forEach((p, pIdx) => {
            const parsed = parseNoteString(p);
            if (parsed) {
              const b = (pitchBeats[pIdx] !== undefined) ? pitchBeats[pIdx] : getNoteDurationInBeats(note);
              const fullPitchDurSec = b * (60.0 / tempo);
              // Respect elapsed time inside note when starting/scrubbing, otherwise play full pitch duration
              const pitchDurSec = Math.max(0.0, fullPitchDurSec - elapsedInCurrentNote);
              playSingleNoteSound(midiToFreq(parsed.midi), pitchDurSec * 0.85);
            }
          });
        }

        highlightNoteForDur(note, currentNoteIndex, fullDurationSec);
        noteStartTimestamp = Date.now() - (elapsedInCurrentNote * 1000);

        expectedElapsedTime += durationSec;
        
        const elapsedMs = Date.now() - schedulerStartTime;
        const expectedMs = expectedElapsedTime * 1000;
        const driftMs = elapsedMs - (expectedMs - durationSec * 1000);
        
        const nextDelayMs = Math.max(0, durationSec * 1000 - driftMs);

        timerId = setTimeout(() => {
          currentNoteIndex++;
          elapsedInCurrentNote = 0.0;
          playNextTick();
        }, nextDelayMs);
      }

      function getNoteDurationInBeats(note) {
        if (!note) return 1.0;
        if (note.beats !== undefined) return note.beats;
        const dur = note.duration;
        if (dur.startsWith('w')) return 4.0;
        if (dur.startsWith('h')) return dur.indexOf('d') !== -1 ? 3.0 : 2.0;
        if (dur.startsWith('q')) return dur.indexOf('d') !== -1 ? 1.5 : 1.0;
        if (dur.startsWith('8')) return dur.indexOf('d') !== -1 ? 0.75 : 0.5;
        if (dur.startsWith('16')) return 0.25;
        return 1.0;
      }

      function getDurationInSec(note) {
        return getNoteDurationInBeats(note) * (60.0 / tempo);
      }

      function getTotalDuration() {
        let totalBeats = 0.0;
        playbackNotes.forEach(note => {
          totalBeats += getNoteDurationInBeats(note);
        });
        return totalBeats * (60.0 / tempo);
      }

      function getCurrentPlaybackTime() {
        let elapsedBeforeCurrent = 0.0;
        for (let i = 0; i < currentNoteIndex; i++) {
          elapsedBeforeCurrent += getDurationInSec(playbackNotes[i]);
        }
        if (!isPlaying) {
          return elapsedBeforeCurrent + elapsedInCurrentNote;
        }
        const elapsedInNote = (Date.now() - noteStartTimestamp) / 1000;
        const currentDur = getDurationInSec(playbackNotes[currentNoteIndex]);
        return elapsedBeforeCurrent + Math.min(currentDur, elapsedInNote);
      }

      function formatTime(sec) {
        if (isNaN(sec) || sec < 0) sec = 0;
        const mins = Math.floor(sec / 60);
        const secs = Math.floor(sec % 60);
        return mins + ':' + (secs < 10 ? '0' : '') + secs;
      }

      function highlightNoteForDur(note, index, defaultDurSec) {
        // Rely on window.highlightCurrentNote(nominalTime) called by updateProgressUI on every frame.
      }

      let lastMessageTime = 0;
      function updateProgressUI(currentTime) {
        const total = getTotalDuration();
        const progressPercent = total > 0 ? (currentTime / total) * 100 : 0;
        
        const fill = document.getElementById('progress-bar-fill');
        const knob = document.getElementById('progress-bar-knob');
        const timeText = document.getElementById('time-display');
        
        if (fill) fill.style.width = progressPercent + '%';
        if (knob) knob.style.left = progressPercent + '%';
        if (timeText) timeText.textContent = formatTime(currentTime) + ' / ' + formatTime(total);

        // Update highlight based on nominalTime
        const speed = tempo / originalTempo;
        const nominalTime = currentTime * speed;
        window.highlightCurrentNote(nominalTime);

        const now = Date.now();
        if (now - lastMessageTime > 33 || !isPlaying) {
          lastMessageTime = now;
          sendResponse({
            type: 'PLAYBACK_PROGRESS',
            currentTime: currentTime,
            duration: total,
            isPlaying: isPlaying
          });
        }
      }

      function runProgressAnimation() {
        if (!isPlaying) return;
        updateProgressUI(getCurrentPlaybackTime());
        requestAnimationFrame(runProgressAnimation);
      }

      window.togglePlay = function() {
        initAudio();
        if (isPlaying) {
          pausePlayback();
        } else {
          startPlayback();
        }
      };

      function startPlayback() {
        console.log("[PLAYBACK AUDIT] Transport start (startPlayback) called. isPlaying: " + isPlaying + ", currentNoteIndex: " + currentNoteIndex + ", playbackNotes length: " + playbackNotes.length);
        if (isPlaying) return;
        initAudio();
        isPlaying = true;
        updatePlayButtonUI();
        
        if (currentNoteIndex >= playbackNotes.length) {
          currentNoteIndex = 0;
        }
        
        schedulerStartTime = Date.now();
        expectedElapsedTime = 0.0;
        
        runProgressAnimation();
        playNextTick();

        sendResponse({
          type: 'PLAYBACK_STATE',
          isPlaying: true,
          currentTime: getCurrentPlaybackTime(),
          duration: getTotalDuration()
        });
      }

      function pausePlayback() {
        if (!isPlaying) return;
        const elapsedInNote = (Date.now() - noteStartTimestamp) / 1000;
        const currentDur = getDurationInSec(playbackNotes[currentNoteIndex]);
        elapsedInCurrentNote = Math.min(currentDur, elapsedInNote);

        isPlaying = false;
        updatePlayButtonUI();
        stopAllOscillators();
        
        // Clear timer timeouts
        if (timerId) {
          clearTimeout(timerId);
          timerId = null;
        }

        // Force one final progress UI update to highlight the paused note
        updateProgressUI(getCurrentPlaybackTime());

        sendResponse({
          type: 'PLAYBACK_STATE',
          isPlaying: false,
          currentTime: getCurrentPlaybackTime(),
          duration: getTotalDuration()
        });
      }

      window.restartPlayback = function() {
        const wasPlaying = isPlaying;

        pausePlayback();

        currentNoteIndex = 0;
        elapsedInCurrentNote = 0.0;
        expectedElapsedTime = 0.0;
        schedulerStartTime = 0;

        clearAllHighlights();
        updateProgressUI(0);

        if (wasPlaying || true) {
          startPlayback();
        }
      };

      window.onProgressBarClick = function(event) {
        if (playbackNotes.length === 0) return;
        const rect = event.currentTarget.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        const ratio = Math.max(0, Math.min(1, clickX / rect.width));
        
        const totalDur = getTotalDuration();
        const targetTime = ratio * totalDur;
        
        window.seekToTime(targetTime);
      };

      window.seekToTime = function(targetTime) {
        if (playbackNotes.length === 0) return;
        
        const totalDur = getTotalDuration();
        const clampedTime = Math.max(0, Math.min(totalDur, targetTime));
        
        let accumulatedTime = 0.0;
        let targetIndex = 0;
        let elapsedInNote = 0.0;
        for (let i = 0; i < playbackNotes.length; i++) {
          const noteDur = getDurationInSec(playbackNotes[i]);
          if (accumulatedTime + noteDur > clampedTime) {
            targetIndex = i;
            elapsedInNote = clampedTime - accumulatedTime;
            break;
          }
          accumulatedTime += noteDur;
          targetIndex = i;
        }
        
        const wasPlaying = isPlaying;
        pausePlayback();
        
        currentNoteIndex = targetIndex;
        elapsedInCurrentNote = elapsedInNote;
        clearAllHighlights();
        
        const note = playbackNotes[currentNoteIndex];
        if (note) {
          const durationSec = getDurationInSec(note);
          highlightNoteForDur(note, currentNoteIndex, durationSec);
        }
        
        updateProgressUI(clampedTime);
        
        if (wasPlaying) {
          startPlayback();
        }
      };

      window.setTempo = function(newTempo, isUserInitiated) {
        const wasPlaying = isPlaying;
        if (isPlaying) {
          pausePlayback();
        }
        const oldTempo = tempo;
        tempo = newTempo;
        const label = document.getElementById('tempo-val');
        if (label) label.textContent = Math.round(newTempo);
        const input = document.getElementById('tempo-val-input');
        if (input) input.value = Math.round(newTempo);
        const slider = document.getElementById('tempo-range');
        if (slider) slider.value = Math.round(newTempo);
        
        try {
          let xml = atob(musicxmlBase64);
          xml = xml.replace(
            /<per-minute>[0-9.]+<\/per-minute>/g, '<per-minute>' + Math.round(newTempo) + '</per-minute>');
          xml = xml.replace(/tempo="[0-9.]+"/g, 'tempo="' + Math.round(newTempo) + '"');
          musicxmlBase64 = btoa(xml);
          renderScore();
        } catch (e) {
          console.error("Failed to update tempo in MusicXML SVG:", e);
        }

        if (isUserInitiated) {
          // Reset playback position to 0 on tempo change
          currentNoteIndex = 0;
          elapsedInCurrentNote = 0.0;
          expectedElapsedTime = 0.0;
          schedulerStartTime = 0;
          clearAllHighlights();
          updateProgressUI(0);

          sendResponse({
            type: 'TEMPO_CHANGE',
            tempo: newTempo,
            rate: newTempo / originalTempo
          });
        } else {
          // Programmatic tempo sync: scale elapsedInCurrentNote if playing/paused
          if (oldTempo > 0 && newTempo > 0) {
            elapsedInCurrentNote = elapsedInCurrentNote * (oldTempo / newTempo);
          }
          if (wasPlaying) {
            startPlayback();
          }
        }
      };

      function parseNoteString(noteStr) {
        const normalized = noteStr.trim();
        const match = normalized.match(/^([A-Ga-g])([#bn]?)(-\d+|\d+)?$/);
        if (!match) return null;
        const letter = match[1].toLowerCase();
        const accidental = match[2] || '';
        const octave = match[3] !== undefined ? Number(match[3]) : 4;
        
        if (letter === 'f' && accidental === 'b') {
          // Fb is E
          return { letter, accidental, octave, midi: (octave + 1) * 12 + 4 };
        }
        if (letter === 'c' && accidental === 'b') {
          // Cb is B of previous octave
          return { letter, accidental, octave, midi: octave * 12 + 11 };
        }
        if (letter === 'b' && accidental === '#') {
          // B# is C of next octave
          return { letter, accidental, octave, midi: (octave + 2) * 12 + 0 };
        }
        if (letter === 'e' && accidental === '#') {
          // E# is F
          return { letter, accidental, octave, midi: (octave + 1) * 12 + 5 };
        }
        
        const offsets = { c:0, 'c#':1, db:1, d:2, 'd#':3, eb:3, e:4, f:5, 'f#':6, gb:6, g:7, 'g#':8, ab:8, a:9, 'a#':10, bb:10, b:11 };
        const lookupAcc = accidental === 'n' ? '' : accidental;
        const keyName = match[1].toLowerCase() + lookupAcc;
        const offset = offsets[keyName] || 0;
        const midi = (octave + 1) * 12 + offset;
        
        return { letter, accidental, octave, midi };
      }

      function showError(message) {
        const error = document.getElementById('error');

        score.innerHTML = '';

      }

      let vrvToolkit = null;
      let verovioLoaded = false;

      // Helper to get exact top and bottom Y coordinates of staff lines
      // Returns the Y range of the 5 staff lines ONLY.
      // Uses direct path children of staffEl so ledger lines inside .layer are excluded.
      function getStaffLinesYRange(staffEl) {
        // Prefer direct path children (the 5 staff lines)
        // Fallback to all descendant paths only if no direct paths found
        const directPaths = Array.from(staffEl.childNodes).filter(node => node.nodeName.toLowerCase() === 'path');
        const pathsToUse = directPaths.length > 0 ? directPaths : Array.from(staffEl.querySelectorAll('path'));
        let minY = Infinity;
        let maxY = -Infinity;
        pathsToUse.forEach(p => {
          const d = p.getAttribute('d') || '';
          // Match simple horizontal lines: M x1 y1 L x2 y2 (where y1 === y2)
          const match = d.match(/^Ms*([-d.]+)[, ]s*([-d.]+)s+Ls*([-d.]+)[, ]s*([-d.]+)s*$/i);
          if (match) {
            const y1 = parseFloat(match[2]);
            const y2 = parseFloat(match[4]);
            if (Math.abs(y1 - y2) < 1) { // horizontal line (y1 === y2)
              if (y1 < minY) minY = y1;
              if (y1 > maxY) maxY = y1;
            }
          }
        });
        return { minY, maxY };
      }

      // Returns the X span of the staff lines for this measure (left barline to right barline).
      // Uses direct path children of staffEl to avoid picking up note/ledger/symbol paths.
      function getStaffLinesXRange(staffEl) {
        const directPaths = Array.from(staffEl.childNodes).filter(node => node.nodeName.toLowerCase() === 'path');
        const pathsToUse = directPaths.length > 0 ? directPaths : Array.from(staffEl.querySelectorAll('path'));
        let minX = Infinity;
        let maxX = -Infinity;
        pathsToUse.forEach(p => {
          const d = p.getAttribute('d') || '';
          const match = d.match(/^Ms*([-d.]+)[, ]s*([-d.]+)s+Ls*([-d.]+)[, ]s*([-d.]+)s*$/i);
          if (match) {
            const x1 = parseFloat(match[1]);
            const x2 = parseFloat(match[3]);
            const y1 = parseFloat(match[2]);
            const y2 = parseFloat(match[4]);
            if (Math.abs(y1 - y2) < 1) { // horizontal = staff line
              if (x1 < minX) minX = x1;
              if (x2 > maxX) maxX = x2;
            }
          }
        });
        return { minX, maxX };
      }

      // Reliably determines where actual measure content starts (after clef/keySig/meterSig).
      // Uses direct x-attribute parsing on <use> elements — no getBBox() needed.
      //
      // Returns the x coordinate where the selection rect should begin,
      // or null if this is NOT a first-in-system measure (no headers to skip).
      function getContentStartX(staffEl) {
        // First: check if this staff has ANY header elements with <use> children.
        // Only first-in-system measures have clef/keySig/meterSig with real content.
        let hasHeaders = false;
        let headerMaxX = -Infinity;
        const headerReport = {};
        ['.clef', '.keySig', '.meterSig'].forEach(sel => {
          const el = staffEl.querySelector(sel);
          const cls = sel.replace('.', '');
          if (!el) { headerReport[cls] = 'element_not_found'; return; }
          const uses = el.querySelectorAll('use');
          headerReport[cls] = { useCount: uses.length, xValues: [] };
          uses.forEach(u => {
            const xAttr = parseFloat(u.getAttribute('x') || '-Infinity');
            headerReport[cls].xValues.push(xAttr);
            if (!isNaN(xAttr) && isFinite(xAttr)) {
              hasHeaders = true;
              if (xAttr > headerMaxX) headerMaxX = xAttr;
            }
          });
        });

        console.log('[SEL-DBG] getContentStartX called for staff:', staffEl.getAttribute('data-bar-id') || staffEl.id || '(no id)');
        console.log('[SEL-DBG] HEADER ELEMENTS FOUND:', JSON.stringify(headerReport));
        console.log('[SEL-DBG] hasHeaders:', hasHeaders, '| headerMaxX:', headerMaxX);

        // If no header elements found: this is a non-first-in-system measure.
        // Return null so caller uses the staff line's minX (the barline position).
        if (!hasHeaders) {
          console.log('[SEL-DBG] getContentStartX returning null (no headers = non-first measure)');
          return null;
        }

        // This IS a first-in-system measure. Find where actual content begins.
        // Prefer: the leftmost <use> x inside .layer (first note/rest position).
        const layerEl = staffEl.querySelector('.layer');
        if (layerEl) {
          let layerMinX = Infinity;
          const layerUseXs = [];
          layerEl.querySelectorAll('use').forEach(u => {
            const xAttr = parseFloat(u.getAttribute('x') || 'Infinity');
            layerUseXs.push(xAttr);
            if (!isNaN(xAttr) && xAttr < layerMinX) layerMinX = xAttr;
          });
          console.log('[SEL-DBG] .layer <use> x values:', JSON.stringify(layerUseXs), '| layerMinX:', layerMinX);
          if (layerMinX !== Infinity) {
            console.log('[SEL-DBG] getContentStartX returning layerMinX:', layerMinX);
            return layerMinX;
          }
        } else {
          console.log('[SEL-DBG] .layer element not found in this staff');
        }

        // Fallback: use header rightmost x + gap (header symbol width is typically ~500 units)
        const fallback = headerMaxX + 500;
        console.log('[SEL-DBG] getContentStartX returning headerMaxX+500 fallback:', fallback);
        return fallback;
      }


      // Legacy: kept for backward compatibility with any callers.
      // New code should use getContentStartX() instead.
      function getHeaderRightEdge(staffEl) {
        let maxRight = -Infinity;
        const headerSelectors = ['.clef', '.keySig', '.meterSig'];
        headerSelectors.forEach(selector => {
          const el = staffEl.querySelector(selector);
          if (!el) return;
          // First try reading x attr from <use> elements (reliable, no getBBox)
          el.querySelectorAll('use').forEach(u => {
            const xAttr = parseFloat(u.getAttribute('x') || '-Infinity');
            if (!isNaN(xAttr) && xAttr > maxRight) maxRight = xAttr;
          });
          // Also try getBBox as secondary source
          try {
            const bbox = el.getBBox();
            const rightEdge = bbox.x + bbox.width;
            if (rightEdge > maxRight) maxRight = rightEdge;
          } catch (e) { /* ignore */ }
        });
        return maxRight;
      }

      function ensureSelectionMetadata(root) {
        if (!root) return;
        const measures = root.querySelectorAll('.measure');
        const numMeasures = measures.length;
        measures.forEach((measureEl, mIdx) => {
          if (!measureEl.getAttribute('n')) {
            measureEl.setAttribute('n', String(mIdx + 1));
          }
          const staves = measureEl.querySelectorAll('.staff');
          staves.forEach((staffEl, sIdx) => {
            if (!staffEl.getAttribute('n')) {
              staffEl.setAttribute('n', String(sIdx + 1));
            }
          });
        });

        // Get part staves counts and measures count from MusicXML
        let partStavesCounts = [];
        measuresPerPart = 0;
        try {
          const xmlText = atob(musicxmlBase64);
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(xmlText, "text/xml");
          const xmlParts = xmlDoc.getElementsByTagName("part");
          for (let i = 0; i < xmlParts.length; i++) {
            const part = xmlParts[i];
            const measure1 = part.getElementsByTagName("measure")[0];
            const stavesElem = measure1 ? measure1.getElementsByTagName("staves")[0] : null;
            const count = stavesElem ? parseInt(stavesElem.textContent) : 1;
            partStavesCounts.push(count);
          }
          const totalMeasures = xmlDoc.getElementsByTagName("measure").length;
          measuresPerPart = xmlParts.length > 0 ? (totalMeasures / xmlParts.length) : 0;
        } catch (e) {
          console.error("Error parsing MusicXML for staff counts:", e);
        }
        globalPartStavesCounts = partStavesCounts;

        const systems = root.querySelectorAll('.system');
        console.log("System count:", systems.length);
        console.log("Measure count:", measures.length);

        systems.forEach((systemEl, sysIdx) => {
          // Find staves in the first measure of this system
          const systemMeasures = systemEl.querySelectorAll('.measure');
          if (systemMeasures.length === 0) return;
          
          const firstMeasure = systemMeasures[0];
          const xmlMeasureNum = parseInt(firstMeasure.getAttribute('n') || '1');
          console.log("System " + (sysIdx + 1) + " -> Measure " + xmlMeasureNum);

          const staves = firstMeasure.querySelectorAll('.staff');

          // Staff grouping structure logging (on the first system)
          if (sysIdx === 0) {
            console.log("Staff count:", staves.length);
            console.log("Staff grouping structure:");
            let staffIndex = 0;
            partStavesCounts.forEach((count, pIdx) => {
              console.log("  Part " + (pIdx + 1) + " contains " + count + " staves");
              for (let i = 0; i < count; i++) {
                const sEl = staves[staffIndex];
                if (sEl) {
                  console.log("    SVG Staff " + (staffIndex + 1) + " (class: " + sEl.getAttribute("class") + ")");
                }
                staffIndex++;
              }
            });
          }
          
          if (staves.length > 0) {
            const staffRanges = Array.from(staves).map(staff => getStaffLinesYRange(staff));
            
            let currentCounts = [...partStavesCounts];
            if (currentCounts.length === 0) {
              for (let i = 0; i < staves.length; i++) {
                currentCounts.push(1);
              }
            }
            console.log("DEBUG RANGES: currentCounts =", JSON.stringify(currentCounts));
            
            let staffIdx = 0;
            const partRanges = [];
            currentCounts.forEach((count, pIdx) => {
               let partMinY = Infinity;
               let partMaxY = -Infinity;
               for (let i = 0; i < count; i++) {
                 const range = staffRanges[staffIdx];
                 if (range) {
                   if (range.minY < partMinY) partMinY = range.minY;
                   if (range.maxY > partMaxY) partMaxY = range.maxY;
                 }
                 staffIdx++;
               }
               if (partMinY !== Infinity && partMaxY !== -Infinity) {
                 partRanges.push({ minY: partMinY, maxY: partMaxY, count: count });
               }
            });
            
            // Find system connector paths (vertical lines outside measures/staves)
            const allPaths = systemEl.querySelectorAll('path');
            const systemPaths = Array.from(allPaths).filter(p => !p.closest('.measure') && !p.closest('.staff'));
            
            systemPaths.forEach((pathEl, idx) => {
              const d = pathEl.getAttribute('d') || '';
              const match = d.match(/M\s*([-\d.]+)[, ]\s*([-\d.]+)\s+L\s*([-\d.]+)[, ]\s*([-\d.]+)/i);
              if (match) {
                const x1 = parseFloat(match[1]);
                const y1 = parseFloat(match[2]);
                const x2 = parseFloat(match[3]);
                const y2 = parseFloat(match[4]);
                
                // If it's a vertical line (system connector)
                if (Math.abs(x1 - x2) < 5) {
                  const x = (x1 + x2) / 2;
                  const ns = 'http://www.w3.org/2000/svg';
                  
                  partRanges.forEach(range => {
                    if (range.count > 1) { // Only draw connector if it's a grand staff pair (count > 1)
                      const newPath = document.createElementNS(ns, 'path');
                      Array.from(pathEl.attributes).forEach(attr => {
                        newPath.setAttribute(attr.name, attr.value);
                      });
                      newPath.setAttribute('d', "M" + x + " " + range.minY + " L" + x + " " + range.maxY);
                      pathEl.parentNode.insertBefore(newPath, pathEl);
                    }
                  });
                  
                  // Remove original system-wide path
                  pathEl.parentNode.removeChild(pathEl);
                }
              }
            });
          }

          // Inject measure numbers above the top staff of each part in the first measure of this system
          let currentStaffIndex = 0;
          partStavesCounts.forEach((count, pIdx) => {
            const partStartMeasureNum = pIdx * (measuresPerPart || 4) + xmlMeasureNum;
            const staffEl = staves[currentStaffIndex];
            
            if (staffEl) {
              let label = staffEl.querySelector('.measureLabel');
              if (!label) {
                label = firstMeasure.querySelector('.measureLabel.part-' + pIdx);
              }
              
              if (!label) {
                let bbox;
                try {
                  bbox = staffEl.getBBox();
                } catch (e) {
                  bbox = { x: 0, y: 0 };
                }
                const ns = 'http://www.w3.org/2000/svg';
                label = document.createElementNS(ns, 'g');
                label.setAttribute('class', 'measureLabel mNum part-' + pIdx);
                const text = document.createElementNS(ns, 'text');
                text.setAttribute('x', String(bbox.x));
                text.setAttribute('y', String(bbox.y - 180));
                text.textContent = String(partStartMeasureNum);
                label.appendChild(text);
                firstMeasure.appendChild(label);
              } else {
                const textEl = label.querySelector('text');
                if (textEl) {
                  textEl.textContent = String(partStartMeasureNum);
                }
                label.setAttribute('class', 'measureLabel mNum part-' + pIdx);
              }
            }
            currentStaffIndex += count;
          });

          // Clean up any extra or duplicate measure labels on the first measure
          const allFirstMeasureLabels = firstMeasure.querySelectorAll('.measureLabel, .mNum');
          allFirstMeasureLabels.forEach(lbl => {
            let isPartLabel = false;
            partStavesCounts.forEach((_, pIdx) => {
              if (lbl.classList.contains('part-' + pIdx)) {
                isPartLabel = true;
              }
            });
            if (!isPartLabel) {
              lbl.parentNode.removeChild(lbl);
            }
          });

          // Remove measure labels from all subsequent measures in this system
          for (let i = 1; i < systemMeasures.length; i++) {
            const otherMeasure = systemMeasures[i];
            const labels = otherMeasure.querySelectorAll('.measureLabel, .mNum');
            labels.forEach(lbl => {
              lbl.parentNode.removeChild(lbl);
            });
          }
        });
      }


      function renderScore() {
        console.log("[RENDER] START");
        console.log("[INSERT STAFF] renderScore() executed");
        console.log("ACTIVE RENDERSCORE FILE");
        console.log("ACTIVE RENDERSCORE FILE: src/components/sheetMusicShared.ts");
        console.log("RENDER SCORE CALLED", {
          selectedStaffNum, selectedMeasureNum, selectedBarId, selectedNoteId
        });
        window.ReactNativeWebView?.postMessage("RENDER SCORE CALLED");
        window.parent?.postMessage("RENDER SCORE CALLED", "*");

        console.log("Verovio available:", typeof verovio);
        if (!verovioLoaded) {
          console.log("Verovio WebAssembly toolkit is not fully initialized yet. Skipping render.");
          return;
        }
        try {
          console.log("Starting render");
          if (typeof verovio === 'undefined') {
            throw new Error('Verovio WebAssembly toolkit failed to initialize.');
          }
          if (!vrvToolkit) {
            vrvToolkit = new verovio.toolkit();
          }

          let musicxml = atob(musicxmlBase64);
          if (!musicxml) {
            showError("No MusicXML score data provided.");
            return;
          }

          try {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(musicxml, "text/xml");

            // MusicXML Notes Audit
            try {
              const divisionsEl = xmlDoc.getElementsByTagName("divisions")[0];
              const divisions = divisionsEl ? parseInt(divisionsEl.textContent, 10) : 4;
              console.log("[AUDIT] Divisions declared:", divisions);
              
              const expectedDurations = {
                "whole": { dotted: divisions * 6, normal: divisions * 4 },
                "half": { dotted: divisions * 3, normal: divisions * 2 },
                "quarter": { dotted: divisions * 1.5, normal: divisions * 1 },
                "eighth": { dotted: divisions * 0.75, normal: divisions * 0.5 },
                "16th": { dotted: divisions * 0.375, normal: divisions * 0.25 }
              };

              const notes = xmlDoc.getElementsByTagName("note");
              console.log("[AUDIT] Starting MusicXML notes audit. Count:", notes.length);
              let mismatchCount = 0;

              for (let i = 0; i < notes.length; i++) {
                const noteEl = notes[i];
                
                // 1. Pitch
                let pitch = "rest";
                const restEl = noteEl.getElementsByTagName("rest");
                if (restEl.length === 0) {
                  const stepEl = noteEl.getElementsByTagName("step")[0];
                  const octEl = noteEl.getElementsByTagName("octave")[0];
                  const alterEl = noteEl.getElementsByTagName("alter")[0];
                  if (stepEl && octEl) {
                    let step = stepEl.textContent;
                    let oct = octEl.textContent;
                    let alter = "";
                    if (alterEl) {
                      const altVal = alterEl.textContent;
                      if (altVal === "1") alter = "#";
                      else if (altVal === "-1") alter = "b";
                    }
                    pitch = step + alter + oct;
                  }
                }

                // 2. Duration
                const durEl = noteEl.getElementsByTagName("duration")[0];
                const duration = durEl ? parseInt(durEl.textContent, 10) : 0;

                // 3. Type
                const typeEl = noteEl.getElementsByTagName("type")[0];
                const type = typeEl ? typeEl.textContent : "";

                // 4. Dot
                const dotEl = noteEl.getElementsByTagName("dot");
                const dot = dotEl.length > 0;

                // Log every note
                console.log(
                  "[AUDITED NOTE] pitch=" + pitch + " duration=" + duration + " type=" + type + " dot=" + dot
                );

                // Verify duration matches the declared MusicXML type
                const expectedEntry = expectedDurations[type];
                let isMismatch = false;
                let expected = -1;
                if (expectedEntry) {
                  expected = dot ? expectedEntry.dotted : expectedEntry.normal;
                  if (duration !== expected) {
                    isMismatch = true;
                  }
                } else if (type) {
                  isMismatch = true; // Unknown/unsupported non-empty type
                }

                if (isMismatch) {
                  mismatchCount++;
                  console.log(
                    "[DURATION MISMATCH] pitch=" + pitch + " type=" + type + " dot=" + dot + " actual_duration=" + duration + " expected_duration=" + expected
                  );
                }
              }
              console.log("[AUDIT] MusicXML notes audit complete. Mismatches found:", mismatchCount);
            } catch (auditErr) {
              console.error("[AUDIT ERROR]", auditErr);
            }

            // Feature 1: Remove automatic staff labels ("Music 1", "Music 2", etc.)
            const partNames = xmlDoc.getElementsByTagName("part-name");
            for (let i = 0; i < partNames.length; i++) {
              partNames[i].textContent = "";
            }
            const partAbbrs = xmlDoc.getElementsByTagName("part-abbreviation");
            for (let i = 0; i < partAbbrs.length; i++) {
              partAbbrs[i].textContent = "";
            }

            // Check if there is any Bass staff in the score (to differentiate Grand Staff vs Single Staff)
            let hasBassClef = false;
            const clefs = xmlDoc.getElementsByTagName("clef");
            for (let i = 0; i < clefs.length; i++) {
              const sign = clefs[i].getElementsByTagName("sign")[0]?.textContent;
              if (sign === "F") {
                hasBassClef = true;
                break;
              }
            }

            // Set class on body to coordinate CSS rules for clefs
            if (hasBassClef) {
              document.body.classList.remove('no-bass-staff');
              document.body.classList.add('has-bass-staff');
            } else {
              document.body.classList.remove('has-bass-staff');
              document.body.classList.add('no-bass-staff');
            }

            // Feature 3: Time signature shown only once at the beginning of the score
            // Remove <time> elements from all parts except the first part
            const parts = xmlDoc.getElementsByTagName("part");
            for (let i = 1; i < parts.length; i++) {
              const part = parts[i];
              const times = part.getElementsByTagName("time");
              while (times.length > 0) {
                times[0].parentNode.removeChild(times[0]);
              }
            }

            // Serialize back to string
            const serializer = new XMLSerializer();
            musicxml = serializer.serializeToString(xmlDoc);
          } catch (e) {

          // Dynamically compute pageWidth based on number of measures

      window.buildLayoutMatrix = function() {
        layoutMatrix = [];
        const measures = document.querySelectorAll('.measure');
        const numMeasures = measures.length;
        if (numMeasures === 0) {
          console.log("LAYOUT MATRIX BUILT (empty)");
          return;
        }

        const firstMeasure = measures[0];
        const staves = firstMeasure.querySelectorAll('.staff');
        const numStaves = staves.length;

        for (let r = 0; r < numStaves; r++) {
          layoutMatrix[r] = [];
        }

        measures.forEach((measureEl, mIdx) => {
          const measureStaves = measureEl.querySelectorAll('.staff');
          measureStaves.forEach((staffEl, sIdx) => {
            if (sIdx < numStaves) {
              const rect = staffEl.getBoundingClientRect();
              
              let pIdx = 0;
              let current = 0;
              if (globalPartStavesCounts && globalPartStavesCounts.length > 0) {
                for (let p = 0; p < globalPartStavesCounts.length; p++) {
                  const count = globalPartStavesCounts[p] || 1;
                  if (sIdx >= current && sIdx < current + count) {
                    pIdx = p;
                    break;
                  }
                  current += count;
                }
              } else {
                pIdx = sIdx;
              }
              const actualMeasuresPerPart = measuresPerPart || (globalPartStavesCounts && globalPartStavesCounts.length > 0 ? Math.round(numMeasures / globalPartStavesCounts.length) : numMeasures);
              const localMIdx = mIdx % actualMeasuresPerPart;
              const globalMeasureNum = pIdx * actualMeasuresPerPart + (localMIdx + 1);

              const cell = {
                barId: staffEl.getAttribute('data-bar-id') || ('staff' + (sIdx + 1) + '_m' + globalMeasureNum),
                staffIndex: sIdx,
                measureIndex: globalMeasureNum - 1,
                x: rect.left,
                y: rect.top,
                width: rect.width,
                height: rect.height,
                centerX: rect.left + rect.width / 2,
                centerY: rect.top + rect.height / 2
              };
              
              layoutMatrix[sIdx][mIdx] = cell;
            }
          });
        });

        console.log("LAYOUT MATRIX BUILT");
        for (let r = 0; r < numStaves; r++) {
          for (let c = 0; c < numMeasures; c++) {
            const cell = layoutMatrix[r][c];
            if (cell) {
              console.log("row=" + r + " col=" + c + "\nbarId=" + cell.barId + "\nx=" + cell.x + "\ny=" + cell.y);
            }
          }
        }
      };

      }
      function getMeasureAndPopupUntransformedCoords(staffEl, score, popupEl) {
        const prevTransform = score.style.transform;
        const prevTransition = score.style.transition;

        // Temporarily clear transform and transition for accurate SVG-space measurement
        score.style.transition = 'none';
        score.style.transform = 'none';

        // Force reflow so the cleared transform is applied before measuring
        void score.offsetWidth;

        const svgEl = score.querySelector('svg');
        const refEl = svgEl || score;

        const rect = staffEl.getBoundingClientRect();
        const refRect = refEl.getBoundingClientRect();

        // popup dims at identity scale (transform cleared)
        let popupWidth = 290;  // fallback
        let popupHeight = 140; // fallback
        if (popupEl) {
          const popupRect = popupEl.getBoundingClientRect();
          if (popupRect.width > 0) popupWidth = popupRect.width;
          if (popupRect.height > 0) popupHeight = popupRect.height;
        }

        // Restore original transform and transition style properties
        score.style.transform = prevTransform;
        score.style.transition = prevTransition;

        // Measure coordinates relative to the SVG/score origin (untransformed / SVG-space)
        const mLeft   = rect.left - refRect.left;
        const mTop    = rect.top  - refRect.top;
        const mWidth  = rect.width;
        const mHeight = rect.height;
        const mCx     = mLeft + mWidth  / 2;
        const mCy     = mTop  + mHeight / 2;

        return {
          measure: {
            left:   mLeft,
            top:    mTop,
            width:  mWidth,
            height: mHeight,
            cx:     mCx,
            cy:     mCy
          },
          popup: {
            width:  popupWidth,
            height: popupHeight
          }
        };
      }

      function updatePopupPreview(staffEl) {
        const previewWrap = document.getElementById('bar-preview-svg-wrap');
        if (!previewWrap) return;
        
        previewWrap.innerHTML = '';
        
        // 1. Get visual bounding box of staffEl
        const bbox = staffEl.getBBox();
        let minX = bbox.x;
        let maxX = bbox.x + bbox.width;
        let minY = bbox.y;
        let maxY = bbox.y + bbox.height;

        // Use the actual bar-click-bg rect coordinates to perfectly align the preview crop
        const clickBg = staffEl.querySelector('.bar-click-bg');
        if (clickBg) {
          const bgX = parseFloat(clickBg.getAttribute('x'));
          const bgW = parseFloat(clickBg.getAttribute('width'));
          const bgY = parseFloat(clickBg.getAttribute('y'));
          const bgH = parseFloat(clickBg.getAttribute('height'));
          if (!isNaN(bgX) && !isNaN(bgW) && !isNaN(bgY) && !isNaN(bgH)) {
            // Check if it is the first measure in the system/staff to keep left elements (clefs/keySig/meterSig) visible
            const parentMeasure = staffEl.closest('.measure');
            const parentSystem = staffEl.closest('.system');
            let isFirstMeasureInSystem = false;
            if (parentMeasure && parentSystem) {
              const systemMeasures = parentSystem.querySelectorAll('.measure');
              if (systemMeasures.length > 0 && systemMeasures[0] === parentMeasure) {
                isFirstMeasureInSystem = true;
              }
            }
            const measureNum = staffEl.getAttribute('data-measure-number') || '1';
            minX = (measureNum === '1' || isFirstMeasureInSystem) ? 0 : bgX;
            maxX = bgX + bgW;
            minY = bgY - 150;
            maxY = bgY + bgH + 150;
          }
        } else {
          // Ensure we cover at least the staff lines range to avoid weird clipping if bg not found
          const yRange = getStaffLinesYRange(staffEl);
          if (yRange.minY !== Infinity && yRange.maxY !== -Infinity) {
            minY = Math.min(minY, yRange.minY - 150); // Pad 150 SVG units above staff lines
            maxY = Math.max(maxY, yRange.maxY + 150); // Pad 150 SVG units below staff lines
          }
        }

        const width = maxX - minX;
        const height = maxY - minY;

        console.log(
          "[PREVIEW BOUNDS]",
          {
            minX,
            maxX,
            minY,
            maxY,
            width,
            height
          }
        );

        // 2. Clone the staff element
        const clonedStaff = staffEl.cloneNode(true);

        console.log(
          "[CLONED STAFF]",
          clonedStaff
        );
        
        // Clean up interactive overlays and handles from cloned staff
        clonedStaff.querySelectorAll('.bar-click-bg').forEach(el => el.remove());
        clonedStaff.querySelectorAll('.staff-handle').forEach(el => el.remove());
        clonedStaff.querySelectorAll('.insert-staff-btn').forEach(el => el.remove());
        
        // Strip selection classes
        clonedStaff.classList.remove('selected-bar');
        clonedStaff.classList.remove('selected-staff');
        
        // Find the root SVG's defs
        const parentSvg = staffEl.closest('svg') || document.querySelector('svg');
        const defs = (parentSvg ? parentSvg.querySelector('defs') : null) || document.querySelector('defs') || document.querySelector('svg defs');

        // 3. Create a new SVG element for the preview
        const previewSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        previewSvg.setAttribute('viewBox', minX + ' ' + minY + ' ' + width + ' ' + height);
        previewSvg.setAttribute('width', '100%');
        previewSvg.setAttribute('height', '100%');
        previewSvg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        
        // Append cloned defs first
        if (defs) {
          previewSvg.appendChild(defs.cloneNode(true));
        }
        
        // Append cloned staff
        previewSvg.appendChild(clonedStaff);

        // Clone and append ties and slurs from the parent system (so cross-measure ties are visible)
        const parentSystem = staffEl.closest('.system') || staffEl.closest('svg');
        if (parentSystem) {
          parentSystem.querySelectorAll('.tie, .slur').forEach(el => {
            previewSvg.appendChild(el.cloneNode(true));
          });
        }

        previewWrap.appendChild(previewSvg);

        console.log(
          "[PREVIEW SVG INSERTED]",
          previewSvg.outerHTML.length
        );

        const wrapRect = previewWrap.getBoundingClientRect();
        console.log(
          "[PREVIEW WRAP RECT]",
          wrapRect
        );

        console.log(
          "[VIEWBOX]",
          previewSvg.getAttribute('viewBox')
        );

        // Send update message to React Native if edit mode is active
        if (isEditModeActive) {
          sendResponse({
            type: 'UPDATE_MODAL_PREVIEW',
            svgHtml: previewSvg.outerHTML
          });
        }

      function ensurePopupVisible(staffEl, popup) {
        const scoreWrap = document.getElementById('score-wrap');
        if (!scoreWrap) return;

        setTimeout(() => {
          const barRect = staffEl.getBoundingClientRect();
          const popupRect = popup.getBoundingClientRect();
          const containerRect = scoreWrap.getBoundingClientRect();

          const minX = Math.min(barRect.left, popupRect.left);
          const maxX = Math.max(barRect.right, popupRect.right);
          const minY = Math.min(barRect.top, popupRect.top);
          const maxY = Math.max(barRect.bottom, popupRect.bottom);

          let deltaX = 0;
          let deltaY = 0;

          if (maxY > containerRect.bottom) {
            deltaY = maxY - containerRect.bottom + 20;
          }
          if (minY < containerRect.top) {
            deltaY = minY - containerRect.top - 20;
          }

          if (maxX > containerRect.right) {
            deltaX = maxX - containerRect.right + 20;
          }
          if (minX < containerRect.left) {
            deltaX = minX - containerRect.left - 20;
          }

          if (deltaX !== 0 || deltaY !== 0) {
            const targetScrollTop = scoreWrap.scrollTop + deltaY;
            const targetScrollLeft = scoreWrap.scrollLeft + deltaX;

            scoreWrap.scrollTo({
              top: targetScrollTop,
              left: targetScrollLeft,
              behavior: 'smooth'
            });
          }
        }, 50);
      }

      function selectNote(noteId) {
        if (!isEditable) return;
        if (isEditModeActive) {
          const noteEl = document.getElementById(noteId);
          const parentBar = noteEl ? noteEl.closest('.staff') : null;
          const parentBarId = parentBar ? parentBar.getAttribute('data-bar-id') : null;
          if (parentBarId !== editingBarId) {
            exitEditMode();
          }
        }

        updateSelectionState(null, null, null, 'selectNote');
        resetDoubleTapTimer();
        document.querySelectorAll('.selected-staff').forEach(el => el.classList.remove('selected-staff'));
        document.querySelectorAll('.selected-handle').forEach(el => el.classList.remove('selected-handle'));
        document.querySelectorAll('.selected-measure').forEach(el => el.classList.remove('selected-measure'));
        document.querySelectorAll('.selected-bar').forEach(el => el.classList.remove('selected-bar'));
        
        // Multi-selection logic:
        const idx = selectedNoteIds.indexOf(noteId);
        if (idx > -1) {
          // Deselect note
          selectedNoteIds.splice(idx, 1);
          const el = document.getElementById(noteId);
          if (el) el.classList.remove('selected-note');
        } else {
          if (selectedNoteIds.length >= 2) {
            // Clear all previous selections
            selectedNoteIds.forEach(id => {
              const el = document.getElementById(id);
              if (el) el.classList.remove('selected-note');
            });
            selectedNoteIds = [noteId];
          } else {
            selectedNoteIds.push(noteId);
          }
          const el = document.getElementById(noteId);
          if (el) el.classList.add('selected-note');
        }

        selectedNoteId = selectedNoteIds.length > 0 ? selectedNoteIds[selectedNoteIds.length - 1] : '';

        sendResponse({
          type: 'NOTES_SELECTED',
          noteIds: selectedNoteIds
        });
      }

            noteEl.addEventListener('click', (e) => {
              e.stopPropagation();
              const noteId = noteEl.getAttribute('id');
              if (noteId) {
                selectNote(noteId);
